name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout control repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl

      - name: Clone OpenWrt 24.10.6
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v24.10.6

      - name: Copy custom files
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default
          cp .config openwrt/.config
          cp diy.sh openwrt/diy.sh
          cp -r patches openwrt/patches_custom

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply 512MB patch
        run: |
          cd openwrt
          git apply patches_custom/tr3000-512.patch

      - name: Run DIY script
        run: |
          cd openwrt
          chmod +x diy.sh
          ./diy.sh

      - name: Make defconfig
        run: |
          cd openwrt
          make defconfig

     - name: Check config only
  run: |
    cd openwrt
    echo "===== BEFORE DEFCONFIG ====="
    grep -E "luci|argon|passwall|firewall4|nftables|usb-net" .config || true
    make defconfig
    echo "===== AFTER DEFCONFIG ====="
    grep -E "luci|argon|passwall|firewall4|nftables|usb-net" .config || true
    echo "Config check finished."

      
