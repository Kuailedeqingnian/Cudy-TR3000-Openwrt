name: Diagnose sing-box

on:
  workflow_dispatch:

env:
  VERSION: "26.05.21-r${{ github.run_number }}"

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    timeout-minutes: 355

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          docker image prune -a -f
          df -h

      - name: Checkout control repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential clang flex bison g++ gawk gcc-multilib \
          g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync unzip zlib1g-dev file wget curl ccache

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v24.10.6
          mkdir -p dl .ccache

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-24.10.6-mediatek-filogic
          restore-keys: |
            openwrt-dl-24.10.6-
            openwrt-dl-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: openwrt/.ccache
          key: openwrt-ccache-24.10.6-mediatek-filogic
          restore-keys: |
            openwrt-ccache-24.10.6-
            openwrt-ccache-

      - name: Copy custom files
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default
          cp diy.sh openwrt/diy.sh
          cp -r patches openwrt/patches_custom
          if [ -d files ]; then cp -r files openwrt/files; fi

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply 512MB patch
        run: |
          cd openwrt
          git apply patches_custom/tr3000-512.patch

      - name: Run DIY
        run: |
          cd openwrt
          chmod +x diy.sh
          ./diy.sh

      - name: Load custom config
        run: |
          cp .config openwrt/.config

      - name: Disable geoview
        run: |
          cd openwrt
          sed -i '/CONFIG_PACKAGE_geoview/d' .config
          sed -i '/CONFIG_PACKAGE_luci-app-passwall_INCLUDE_GeoView/d' .config
          sed -i '/CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Geoview/d' .config
          echo '# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Geoview is not set' >> .config
          echo '# CONFIG_PACKAGE_geoview is not set' >> .config

      - name: Make defconfig and check
        run: |
          cd openwrt
          make defconfig

          echo "===== CHECK GEOVIEW ====="
          grep -i geoview .config || true

          if grep -q "^CONFIG_PACKAGE_geoview=y" .config; then
            echo "❌ geoview auto enabled"
            exit 1
          fi

          echo "===== CHECK SING-BOX ====="
          grep sing-box .config || true

          if ! grep -q "^CONFIG_PACKAGE_sing-box=y" .config; then
            echo "❌ sing-box missing"
            exit 1
          fi

          echo "✅ Config check passed."

      - name: Diagnose sing-box build
        run: |
          cd openwrt
          export CCACHE_DIR="$PWD/.ccache"
          ccache -M 10G
          ccache -z

          make download -j$(nproc)

          echo "===== START SING-BOX DETAILED BUILD ====="
          make package/feeds/passwall_packages/sing-box/clean V=s
          make package/feeds/passwall_packages/sing-box/compile -j1 V=s

          echo "===== SING-BOX BUILD FINISHED ====="
          ccache -s
