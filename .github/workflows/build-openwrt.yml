name: Build OpenWrt

on:
  workflow_dispatch:

env:
  VERSION: "26.05.19-r${{ github.run_number }}"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          docker image prune -a -f
          df -h

      - name: Checkout control repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget curl ccache

      - name: Clone OpenWrt 24.10.6
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v24.10.6
          mkdir -p dl .ccache

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-24.10.6-mediatek-filogic
          restore-keys: |
            openwrt-dl-24.10.6-
            openwrt-dl-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: openwrt/.ccache
          key: openwrt-ccache-24.10.6-mediatek-filogic-${{ github.run_number }}
          restore-keys: |
            openwrt-ccache-24.10.6-mediatek-filogic-
            openwrt-ccache-24.10.6-
            openwrt-ccache-

      - name: Copy custom files
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default
          cp diy.sh openwrt/diy.sh
          cp -r patches openwrt/patches_custom
          if [ -d files ]; then cp -r files openwrt/files; fi

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply 512MB patch
        run: |
          cd openwrt
          git apply patches_custom/tr3000-512.patch

      - name: Run DIY
        run: |
          cd openwrt
          chmod +x diy.sh
          ./diy.sh

      - name: Load custom config
        run: |
          cp .config openwrt/.config

      - name: Make defconfig and check important packages
        run: |
          cd openwrt
          make defconfig
          grep -q '^CONFIG_PACKAGE_luci-base=y' .config
          grep -q '^CONFIG_PACKAGE_luci-theme-argon=y' .config
          grep -q '^CONFIG_PACKAGE_luci-app-argon-config=y' .config
          grep -q '^CONFIG_PACKAGE_kmod-usb-net-rndis=y' .config
          grep -q '^CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y' .config
          grep -q '^CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y' .config
          echo "LuCI, Argon and USB network config confirmed."

      - name: Build firmware with cache
        run: |
          cd openwrt
          export CCACHE_DIR="$PWD/.ccache"
          ccache -M 5G
          make -j$(nproc) CCACHE=1 || make -j1 V=s CCACHE=1
          ccache -s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Cudy-TR3000-OpenWrt-24.10.6-512MB-${{ env.VERSION }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.manifest
