name: Build OpenWrt

on:
  workflow_dispatch:

env:
  VERSION: "26.05.24-r${{ github.run_number }}"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 355

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache
          docker image prune -a -f
          df -h

      - name: Checkout control repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential clang flex bison g++ gawk gcc-multilib \
          g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync unzip zlib1g-dev file wget curl ccache zstd

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v24.10.6
          mkdir -p dl .ccache

      - name: Restore download cache
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-24.10.6-mediatek-filogic
          restore-keys: |
            openwrt-dl-24.10.6-
            openwrt-dl-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: openwrt/.ccache
          key: openwrt-ccache-24.10.6-mediatek-filogic
          restore-keys: |
            openwrt-ccache-24.10.6-
            openwrt-ccache-

      - name: Copy custom files
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default
          cp diy.sh openwrt/diy.sh
          cp -r patches openwrt/patches_custom
          if [ -d files ]; then cp -r files openwrt/files; fi

          if [ -d passwall-ipk ]; then
            cp -r passwall-ipk openwrt/passwall-ipk
          fi

          if [ -f PassWall-26.4.15-pack.zip ]; then
            cp PassWall-26.4.15-pack.zip openwrt/PassWall-26.4.15-pack.zip
          fi

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply 512MB patch
        run: |
          cd openwrt
          git apply patches_custom/tr3000-512.patch

      - name: Run DIY
        run: |
          cd openwrt
          chmod +x diy.sh
          ./diy.sh

      - name: Check TR3000 status file
        run: |
          cd openwrt
          echo "Check files path:"
          ls -l files/etc/profile.d || true
          cat files/etc/profile.d/tr3000-info.sh || true

          echo "Check base-files path:"
          ls -l package/base-files/files/etc/profile.d || true
          cat package/base-files/files/etc/profile.d/tr3000-info.sh || true

          test -f files/etc/profile.d/tr3000-info.sh
          test -f package/base-files/files/etc/profile.d/tr3000-info.sh

      - name: Check injected PassWall files
        run: |
          cd openwrt

          echo "===== CHECK PASSWALL INJECTED FILES ====="

          if [ ! -d files ]; then
            echo "❌ openwrt/files not found"
            exit 1
          fi

          find files -iname '*passwall*' | head -50 || true
          find files -iname '*sing-box*' | head -20 || true
          find files -iname '*xray*' | head -20 || true
          find files -iname '*geoview*' | head -20 || true
          find files -iname '*v2ray-plugin*' | head -20 || true
          find files -iname '*tcping*' | head -20 || true
          find files -iname '*chinadns-ng*' | head -20 || true
          find files -iname '*dns2socks*' | head -20 || true

          if ! find files -iname '*passwall*' | grep -q passwall; then
            echo "❌ PassWall files not injected"
            exit 1
          fi

          if ! find files -iname '*sing-box*' | grep -q sing-box; then
            echo "❌ sing-box files not injected"
            exit 1
          fi

          if ! find files -iname '*xray*' | grep -q xray; then
            echo "❌ xray files not injected"
            exit 1
          fi

          if ! find files -iname '*geoview*' | grep -q geoview; then
            echo "❌ geoview files not injected"
            exit 1
          fi

          if ! find files -iname '*v2ray-plugin*' | grep -q v2ray-plugin; then
            echo "❌ v2ray-plugin files not injected"
            exit 1
          fi

          if ! find files -iname '*tcping*' | grep -q tcping; then
            echo "❌ tcping files not injected"
            exit 1
          fi

          if ! find files -iname '*chinadns-ng*' | grep -q chinadns-ng; then
            echo "❌ chinadns-ng files not injected"
            exit 1
          fi

          if ! find files -iname '*dns2socks*' | grep -q dns2socks; then
            echo "❌ dns2socks files not injected"
            exit 1
          fi

          echo "✅ PassWall fixed IPK files injected."

      - name: Load custom config
        run: |
          cp .config openwrt/.config

      - name: Make defconfig and check important packages
        run: |
          cd openwrt
          make defconfig

          MISSING=0

          check_pkg() {
            PKG="$1"
            if grep -q "^CONFIG_PACKAGE_${PKG}=y" .config; then
              echo "✅ ${PKG}"
            else
              echo "❌ ${PKG}"
              MISSING=1
            fi
          }

          check_pkg luci-base
          check_pkg luci-theme-argon
          check_pkg luci-app-argon-config

          check_pkg luci-i18n-base-zh-cn
          check_pkg luci-i18n-firewall-zh-cn
          check_pkg luci-i18n-package-manager-zh-cn
          check_pkg luci-i18n-samba4-zh-cn

          check_pkg ttyd
          check_pkg luci-app-ttyd
          check_pkg luci-i18n-ttyd-zh-cn

          check_pkg luci-app-ddns
          check_pkg luci-app-wol
          check_pkg luci-app-upnp
          check_pkg luci-app-nlbwmon
          check_pkg luci-app-adguardhome

          check_pkg kmod-usb-net-rndis
          check_pkg kmod-usb-net-cdc-mbim
          check_pkg kmod-usb-net-qmi-wwan

          check_pkg dnsmasq-full
          check_pkg ip-full
          check_pkg curl
          check_pkg kmod-tun
          check_pkg kmod-inet-diag
          check_pkg kmod-netlink-diag
          check_pkg ca-bundle
          check_pkg coreutils-base64
          check_pkg coreutils-nohup
          check_pkg lua
          check_pkg libuci-lua
          check_pkg luci-lib-jsonc
          check_pkg resolveip
          check_pkg microsocks

          if [ "$MISSING" -eq 1 ]; then
            echo "❌ Some required packages are missing."
            exit 1
          fi

          echo "✅ All required packages confirmed."

      - name: Check R63 AdGuardHome LuCI menu package
        run: |
          cd openwrt

          echo "===== CHECK R63 ADGUARDHOME LUCI MENU PACKAGE ====="

          grep -q "^CONFIG_PACKAGE_luci-app-adguardhome=y" .config || {
            echo "❌ luci-app-adguardhome config missing"
            exit 1
          }

          echo "✅ AdGuardHome LuCI menu config confirmed."

      - name: Check TR3000 status file after defconfig
        run: |
          cd openwrt
          echo "Check status file after defconfig:"
          test -f files/etc/profile.d/tr3000-info.sh
          test -f package/base-files/files/etc/profile.d/tr3000-info.sh
          grep -q "TR3000 System Info" files/etc/profile.d/tr3000-info.sh
          grep -q "TR3000 System Info" package/base-files/files/etc/profile.d/tr3000-info.sh
          grep -q "CPU Temp" files/etc/profile.d/tr3000-info.sh
          grep -q "WiFi 2.4G Temp" files/etc/profile.d/tr3000-info.sh
          grep -q "WiFi 5G Temp" files/etc/profile.d/tr3000-info.sh
          grep -q "thermal_zone0/temp" files/etc/profile.d/tr3000-info.sh
          grep -q "phy0/hwmon2/temp1_input" files/etc/profile.d/tr3000-info.sh
          grep -q "phy1/hwmon3/temp1_input" files/etc/profile.d/tr3000-info.sh
          echo "✅ TR3000 status and temperature display still exist after defconfig."

      - name: Check injected PassWall files after defconfig
        run: |
          cd openwrt

          echo "===== CHECK PASSWALL INJECTED FILES AFTER DEFCONFIG ====="

          if ! find files -iname '*passwall*' | grep -q passwall; then
            echo "❌ PassWall files lost after defconfig"
            exit 1
          fi

          if ! find files -iname '*sing-box*' | grep -q sing-box; then
            echo "❌ sing-box files lost after defconfig"
            exit 1
          fi

          if ! find files -iname '*xray*' | grep -q xray; then
            echo "❌ xray files lost after defconfig"
            exit 1
          fi

          if ! find files -iname '*geoview*' | grep -q geoview; then
            echo "❌ geoview files lost after defconfig"
            exit 1
          fi

          if ! find files -iname '*v2ray-plugin*' | grep -q v2ray-plugin; then
            echo "❌ v2ray-plugin files lost after defconfig"
            exit 1
          fi

          if ! find files -iname '*tcping*' | grep -q tcping; then
            echo "❌ tcping files lost after defconfig"
            exit 1
          fi

          if ! find files -iname '*chinadns-ng*' | grep -q chinadns-ng; then
            echo "❌ chinadns-ng files lost after defconfig"
            exit 1
          fi

          if ! find files -iname '*dns2socks*' | grep -q dns2socks; then
            echo "❌ dns2socks files lost after defconfig"
            exit 1
          fi

          echo "✅ PassWall injected files still exist after defconfig."


      - name: Check Hysteria2 injection
        run: |
          cd openwrt
          if [ ! -f files/usr/bin/hysteria ]; then
            echo "❌ Hysteria2 binary missing"
            exit 1
          fi
          echo "✅ Hysteria2 binary confirmed."
      - name: Check PassWall version registration fix
        run: |
          cd openwrt

          echo "===== CHECK PASSWALL VERSION REGISTRATION FIX ====="

          test -f files/etc/uci-defaults/98-passwall-version-fix || {
            echo "❌ PassWall version fix script missing"
            exit 1
          }

          grep -q "Package: luci-app-passwall" files/etc/uci-defaults/98-passwall-version-fix || {
            echo "❌ luci-app-passwall registration missing"
            exit 1
          }

          grep -q "Version: 26.4.15" files/etc/uci-defaults/98-passwall-version-fix || {
            echo "❌ PassWall version 26.4.15 registration missing"
            exit 1
          }

          echo "✅ PassWall version registration fix confirmed."
      - name: Build firmware with cache
        run: |
          cd openwrt
          export CCACHE_DIR="$PWD/.ccache"
          ccache -M 10G
          ccache -z
          make download -j4
          make -j4 CCACHE=1
          ccache -s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Cudy-TR3000-OpenWrt-PassWall-26.4.15-${{ env.VERSION }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.manifest
