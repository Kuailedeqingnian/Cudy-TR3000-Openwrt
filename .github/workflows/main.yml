.github/workflows/build-openwrt.yml
name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout control repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip \
            zlib1g-dev file wget curl

      - name: Clone OpenWrt 24.10.6
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout v24.10.6

      - name: Copy custom files
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default
          cp .config openwrt/.config
          if [ -f diy.sh ]; then cp diy.sh openwrt/diy.sh; fi
          if [ -d patches ]; then cp -r patches openwrt/patches_custom; fi

      - name: Update and install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply custom script
        run: |
          cd openwrt
          if [ -f diy.sh ]; then chmod +x diy.sh && ./diy.sh; fi

      - name: Apply 512MB TR3000 patch
        run: |
          cd openwrt
          if [ -f patches_custom/tr3000-512.patch ]; then
            git apply patches_custom/tr3000-512.patch
          fi

      - name: Generate final config
        run: |
          cd openwrt
          make defconfig

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: TR3000-OpenWrt-24.10.6-512MB
          path: |
            openwrt/bin/targets/mediatek/filogic/*.bin
            openwrt/bin/targets/mediatek/filogic/*.manifest
